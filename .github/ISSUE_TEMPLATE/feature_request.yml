name: Feature request
description: Suggest a new feature or improvement
title: '[Feature]: '
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: |
        What use case isn't well-served by the current library? Please favor
        concrete examples over abstract requests.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like to see this addressed?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've considered (even if they fell short).
    validations:
      required: false
