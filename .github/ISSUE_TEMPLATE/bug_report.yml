name: Bug report
description: Report a problem with @pane-craft/react
title: '[Bug]: '
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the
        sections below so we can reproduce and fix it quickly.

  - type: input
    id: version
    attributes:
      label: Version
      description: Which version of `@pane-craft/react` are you using?
      placeholder: 0.2.0
    validations:
      required: true

  - type: textarea
    id: bug-behavior
    attributes:
      label: What is the bug's behavior?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: What is the expected behavior?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: |
        A minimal reproduction is the single most useful thing you can provide.
        Link to a sandbox / StackBlitz, or include a small code snippet.
        Without a reproduction it may be more challenging to investigate.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Run this in your project and paste the output:

            npx envinfo --system --binaries --browsers --npmPackages '{react,react-dom,@pane-craft/react}'
      render: shell
    validations:
      required: false
