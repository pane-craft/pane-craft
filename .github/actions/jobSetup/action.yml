name: Job Setup
description: >
  Set up pnpm, Node.js, and install dependencies. `actions/checkout` must run
  in the calling job before this action because this action's file is only on
  disk after checkout.

inputs:
  node-version:
    description: Node.js version to install.
    required: false
    default: '22'

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@739bfe42ca9233c5e6aca07c1a25a9d34aca49b0 # v6.0.7

    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm

    - run: pnpm install --frozen-lockfile
      shell: bash
